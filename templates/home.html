{% extends "base.html" %}
{% block title %}Inicio{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="h4 mb-2">Bienvenido</h1>
          <p class="text-muted mb-3">
            Has iniciado sesión correctamente.
            {% if es_admin %}Rol: <b>Administrador</b>.{% elif es_docente %}Rol: <b>Docente</b>.{% endif %}
          </p>
          <a class="btn btn-primary" href="{% url 'reservas:lista_reservas' %}">Ver reservas</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
